<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-label="Kashyap Chambers mark">
  <rect width="32" height="32" fill="#0e1a2b"/>
  <g stroke="#c8a25a" stroke-width="1.4" fill="none" stroke-linecap="square">
    <!-- pillar capital -->
    <line x1="6" y1="9" x2="26" y2="9"/>
    <line x1="6" y1="11" x2="26" y2="11"/>
    <!-- two columns -->
    <line x1="11" y1="11" x2="11" y2="23"/>
    <line x1="21" y1="11" x2="21" y2="23"/>
    <!-- base -->
    <line x1="6" y1="23" x2="26" y2="23"/>
    <line x1="6" y1="25" x2="26" y2="25"/>
  </g>
</svg>
